app = 'langflow-arc'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 7680
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = 'performance'
  cpus = 2
  memory_mb = 4096
